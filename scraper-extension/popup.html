<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; font-family: sans-serif; padding: 15px; background: #F0E6FF; color: #1f1f1f; text-align: center; }
    h3 { margin-top: 0; }
    button { 
      background-color: #7A00DF; color: white; border: none; padding: 10px 15px; 
      border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px;
    }
    button:hover { opacity: 0.9; }
    #status { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <h3>IELTS Scraper</h3>
  <p style="font-size: 12px;">Go to the <a href="https://practicepteonline.com/listening-ielts-tests/" target="_blank">tests page</a> and click Start!</p>
  <button id="startBtn">Start Scraping</button>
  <button id="stopBtn" style="background-color: #D32F2F;">Stop & Download</button>
  <div id="status">Ready</div>
  <script src="popup.js"></script>
</body>
</html>
